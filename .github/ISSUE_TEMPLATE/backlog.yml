name: Backlog
description: 기능, 개선, 테스트 작업을 백로그로 등록합니다.
title: "[Backlog] "
labels:
  - backlog
body:
  - type: dropdown
    id: backlog_type
    attributes:
      label: 백로그 유형
      description: 작업 성격을 선택하세요.
      options:
        - Feature
        - Improvement
        - Test
        - Refactor
        - Chore
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 요약
      description: 무엇을 왜 해야 하는지 한두 문장으로 적으세요.
      placeholder: 예) 테스트 커버리지 확장을 위해 서비스 레이어 단위 테스트를 추가합니다.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 배경 / 문제
      description: 현재 어떤 문제나 기회가 있는지 적으세요.
      placeholder: 예) 현재 컨트롤러 중심 테스트만 있어 비즈니스 로직 회귀를 빠르게 잡기 어렵습니다.
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 이 작업이 완료되면 어떤 상태가 되어야 하는지 적으세요.
      placeholder: 예) 핵심 서비스 로직이 단위 테스트로 보호되고, 실패 케이스가 명확히 검증됩니다.
    validations:
      required: true

  - type: textarea
    id: in_scope
    attributes:
      label: 범위
      description: 이번 작업에서 포함할 내용을 적으세요.
      placeholder: |
        - PingController 테스트 보강
        - Service 단위 테스트 추가
        - Validation 실패 케이스 추가
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: 제외 범위
      description: 이번 작업에서 하지 않을 것을 적으세요.
      placeholder: |
        - E2E 테스트 도입
        - 운영 배포 파이프라인 변경

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 완료 조건
      description: 완료 여부를 판단할 수 있게 체크리스트로 적으세요.
      placeholder: |
        - [ ] 핵심 서비스 로직 단위 테스트가 추가된다
        - [ ] 실패/예외 케이스가 검증된다
        - [ ] CI에서 테스트가 통과한다
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 관련 PR, 이슈, 문서, 화면, API 명세가 있으면 적으세요.
      placeholder: |
        - PR: #
        - Issue: #
        - Docs:

  - type: textarea
    id: notes
    attributes:
      label: 추가 메모
      description: 리스크, 의존성, 우선순위 판단 근거 등을 적으세요.
